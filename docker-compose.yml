version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: distributed-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: distributed_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0-alpine
    container_name: distributed-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
